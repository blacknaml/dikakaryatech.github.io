{% if page.list_items %}
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    },
    "numberOfItems": {{ page.list_items | size }},
    "itemListElement": [
      {% for item in page.list_items %}
      {
        "@type": "ListItem",
        "position": {{ forloop.index }},
        "item": {
          "@type": "{{ page.item_type | default: 'Thing' }}",
          "name": "{{ item.name | escape }}",
          "description": "{{ item.desc | escape }}"
          {% if item.url %}, "url": "{{ item.url | absolute_url }}"{% endif %}
          {% if item.image %}, "image": "{{ item.image | absolute_url }}"{% endif %}
        }
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  }
</script>
{% endif %}
