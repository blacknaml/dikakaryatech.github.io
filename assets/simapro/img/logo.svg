<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium B2B SaaS Gradients -->
    <!-- Steel Blue Gradient -->
    <linearGradient id="steelBlueGrad" x1="50" y1="20" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1b75bb" />
      <stop offset="100%" stop-color="#0d4b79" />
    </linearGradient>

    <!-- Emerald Green Gradient -->
    <linearGradient id="emeraldGreenGrad" x1="50" y1="20" x2="76" y2="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Amber Orange Gradient -->
    <linearGradient id="amberOrangeGrad" x1="76" y1="35" x2="24" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Drop Shadow for 3D depth -->
    <filter id="cubeShadow" x="0" y="0" width="100" height="100" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#0d4b79" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Outer Isometric Hexagon Container (Thin Accent) -->
  <path d="M50 8 L86 29 L86 71 L50 92 L14 71 L14 29 Z" 
        stroke="#1b75bb" 
        stroke-width="2" 
        stroke-opacity="0.15" 
        stroke-linejoin="round" 
        fill="#f8fafc" 
        fill-opacity="0.3" />

  <!-- 1. The Central Spine (Vertical Stem for the 'P' and 'S' structure) -->
  <path d="M50 20 L50 80" 
        stroke="url(#steelBlueGrad)" 
        stroke-width="8" 
        stroke-linecap="round" 
        filter="url(#cubeShadow)" />

  <!-- 2. The 'P' Loop (Right Face of the Isometric Cube) -->
  <path d="M50 20 L76 35 L76 65 L50 50" 
        stroke="url(#emeraldGreenGrad)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#cubeShadow)" />

  <!-- 3. The 'S' Ribbon (Left and Bottom Faces of the Cube) -->
  <path d="M76 35 L50 20 L24 35 L24 65 L50 50 L76 65 L50 80 L24 65" 
        stroke="url(#amberOrangeGrad)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#cubeShadow)" />

  <!-- 4. Corner Accent Dots (Giving a Network Node/Workflow Look) -->
  <circle cx="50" cy="20" r="3" fill="#FFFFFF" stroke="#0d4b79" stroke-width="1.5" />
  <circle cx="76" cy="35" r="2.5" fill="#FFFFFF" stroke="#059669" stroke-width="1.5" />
  <circle cx="24" cy="65" r="2.5" fill="#FFFFFF" stroke="#d97706" stroke-width="1.5" />
</svg>
